<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackstore</title>
    <style>
        /* Стилі ідентичні index.html */
        body { background-color: #2c313c; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 25px; font-size: 26px; }
        .header img { margin-right: 15px; border-radius: 4px; }
        .main-wrapper { display: flex; gap: 60px; }
        .sidebar { display: flex; flex-direction: column; gap: 12px; width: 220px; flex-shrink: 0; }
        .menu-btn { background-color: #4f5664; color: #ffffff; text-decoration: none; padding: 15px; text-align: center; font-weight: bold; font-size: 15px; border: none; }
        .active-btn { background-color: #3e4451; }
        .content-area { display: flex; flex-grow: 1; gap: 40px; justify-content: space-between; }
        .content { display: flex; flex-direction: column; gap: 25px; flex-grow: 1; padding-top: 5px; max-width: 700px; }
        .content-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; align-items: center; width: 100%; }
        .item-text { font-size: 20px; font-weight: bold; color: #61afef; }
        .buy-link { color: #61afef; text-decoration: underline; font-size: 20px; font-weight: bold; }
        .right-gif img { max-width: 400px; width: 100%; height: auto; border: 1px solid #4f5664; }
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; gap: 30px; }
            .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .menu-btn { flex: 1; min-width: 120px; padding: 10px; }
            .content-area { flex-direction: column; align-items: center; }
            .content-row { grid-template-columns: 1fr; text-align: center; gap: 10px; border-bottom: 1px solid #4f5664; padding-bottom: 15px; }
            .right-gif img { max-width: 300px; }
        }
    </style>
</head>
<body>
    <div class="header"><img src="pepe.gif" width="60"> Hackstore</div>
    <div class="main-wrapper">
        <div class="sidebar">
            <a href="3.html" class="menu-btn">Умови</a>
            <a href="2.html" class="menu-btn active-btn">Скрипти і програми</a>
            <a href="index.html" class="menu-btn">Інструкції</a>
        </div>
        <div class="content-area">
            <div class="content">
                <div class="content-row">
                    <span class="item-text">Python keyloger</span>
                    <span class="item-text">0.0055 XMR</span>
                    <a href="3.html" class="buy-link">Купити</a>
                </div>
                <div class="content-row">
                    <span class="item-text">C++ keyloger</span>
                    <span class="item-text">0.0075 XMR</span>
                    <a href="3.html" class="buy-link">Купити</a>
                </div>
            </div>
            <div class="right-gif"><img src="pepe2.gif"></div>
        </div>
    </div>
</body>
</html>
